services:
  postgres:
    image: postgres:16
    container_name: court_postgres
    environment:
      POSTGRES_DB: court_indexer
      POSTGRES_USER: court_user
      POSTGRES_PASSWORD: court_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: court_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: court_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: court_backend
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
    volumes:
      - ./storage:/app/storage
      - /mnt/hitachi_disk1/JBP/SCANNING/scaned_clean_final:/mnt/hitachi_disk1/JBP/SCANNING/scaned_clean_final:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    container_name: court_worker
    env_file:
      - ./backend/.env.example
    depends_on:
      - postgres
      - redis
      - qdrant
    volumes:
      - ./storage:/app/storage
      - /mnt/hitachi_disk1/JBP/SCANNING/scaned_clean_final:/mnt/hitachi_disk1/JBP/SCANNING/scaned_clean_final:ro
    command: celery -A app.tasks.celery_app.celery_app worker -Q vector_queue --loglevel=INFO --concurrency=1 --hostname=vector@%h

  worker_fast:
    build:
      context: ./backend
    container_name: court_worker_fast
    env_file:
      - ./backend/.env.example
    depends_on:
      - postgres
      - redis
      - qdrant
    volumes:
      - ./storage:/app/storage
      - /mnt/hitachi_disk1/JBP/SCANNING/scaned_clean_final:/mnt/hitachi_disk1/JBP/SCANNING/scaned_clean_final:ro
    command: celery -A app.tasks.celery_app.celery_app worker -Q index_queue --loglevel=INFO --concurrency=2 --hostname=index@%h

  worker_beat:
    build:
      context: ./backend
    container_name: court_worker_beat
    env_file:
      - ./backend/.env.example
    depends_on:
      - postgres
      - redis
      - qdrant
    volumes:
      - ./storage:/app/storage
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=INFO

volumes:
  postgres_data:
  qdrant_data:
